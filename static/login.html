<!DOCTYPE html>
<html lang="zh-CN" class="login-page-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - Chill Poster</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    
</head>
<body class="login-page-body">

    <div id="login-app">
        <canvas id="dynamic-bg"></canvas>

        <transition name="fade">
            <div class="layer-wall" v-if="hasCovers">
                <div class="wall-row left">
                    <div class="wall-track"><div v-for="(item, i) in wallRows[0]" :key="'r1-'+i" class="wall-item"><img :src="item.cover_url" loading="lazy"></div></div>
                </div>
                <div class="wall-row right">
                    <div class="wall-track"><div v-for="(item, i) in wallRows[1]" :key="'r2-'+i" class="wall-item"><img :src="item.cover_url" loading="lazy"></div></div>
                </div>
                <div class="wall-row left">
                    <div class="wall-track"><div v-for="(item, i) in wallRows[2]" :key="'r3-'+i" class="wall-item"><img :src="item.cover_url" loading="lazy"></div></div>
                </div>
                <div class="wall-row right">
                    <div class="wall-track"><div v-for="(item, i) in wallRows[3]" :key="'r4-'+i" class="wall-item"><img :src="item.cover_url" loading="lazy"></div></div>
                </div>
                <div class="wall-row left">
                    <div class="wall-track"><div v-for="(item, i) in wallRows[4]" :key="'r5-'+i" class="wall-item"><img :src="item.cover_url" loading="lazy"></div></div>
                </div>
            </div>
        </transition>

        <div class="layer-overlay"></div>

        <div class="login-card" :class="{shake: isError}">
            <div class="brand-area">
                <div class="logo-icon"><i class="fa-solid fa-shapes"></i></div>
                <h1>Poster Pro</h1>
                <p class="subtitle">Emby 自动化海报设计系统</p>
            </div>

            <div class="input-group">
                <input v-model="form.username" type="text" placeholder="admin" class="custom-input" @keyup.enter="login">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="input-group">
                <input v-model="form.password" type="password" placeholder="password" class="custom-input" @keyup.enter="login">
                <i class="fa-solid fa-lock"></i>
            </div>

            <button class="login-btn" @click="login">
                <span v-if="!loading">立即登录</span>
                <span v-else><i class="fa-solid fa-circle-notch fa-spin"></i> 验证中...</span>
            </button>

            <div class="error-msg">
                <span v-if="errorMsg"><i class="fa-solid fa-circle-exclamation"></i> {{ errorMsg }}</span>
            </div>
        </div>

        <div class="footer">Copyright © 2026 Chill. All Rights Reserved.</div>
    </div>

    <script>
        const { createApp, reactive, ref, onMounted } = Vue;

        createApp({
            setup() {
                const form = reactive({ username: '', password: '' });
                const errorMsg = ref('');
                const loading = ref(false);
                const isError = ref(false);
                
                const wallRows = reactive([[], [], [], [], []]);
                const hasCovers = ref(false);

                // --- 1. Canvas 动画逻辑 (集成在 Setup 中) ---
                const startParticles = () => {
                    const canvas = document.getElementById('dynamic-bg');
                    // 如果 Vue 还没渲染出 canvas，稍后重试
                    if (!canvas) {
                        requestAnimationFrame(startParticles);
                        return;
                    }
                    
                    const ctx = canvas.getContext('2d');
                    let width, height, particles = [];
                    const particleCount = 80;

                    function resize() {
                        width = canvas.width = window.innerWidth;
                        height = canvas.height = window.innerHeight;
                    }

                    class Particle {
                        constructor() { this.reset(); this.y = Math.random() * height; }
                        reset() {
                            this.x = Math.random() * width;
                            this.y = height + Math.random() * 100;
                            this.size = Math.random() * 2 + 0.5;
                            this.speedY = Math.random() * 0.5 + 0.2;
                            this.opacity = Math.random() * 0.5 + 0.1;
                        }
                        update() {
                            this.y -= this.speedY;
                            if (this.y < -10) this.reset();
                        }
                        draw() {
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                            ctx.fill();
                        }
                    }

                    function initParticles() {
                        particles = [];
                        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
                    }

                    function animate() {
                        ctx.clearRect(0, 0, width, height);
                        particles.forEach(p => { p.update(); p.draw(); });
                        requestAnimationFrame(animate);
                    }

                    window.addEventListener('resize', () => { resize(); initParticles(); });
                    resize(); initParticles(); animate();
                };

                // --- 2. 海报墙逻辑 ---
                const initBackground = async () => {
                    try {
                        const configRes = await axios.get('/api/config_302/get');
                        const embys = Array.isArray(configRes.data?.embys) ? configRes.data.embys : [];
                        if (embys.length === 0) return;

                        const svr = embys[0];
                        if (svr.url && svr.key) {
                            const res = await axios.post('/api/library_covers', {
                                url: svr.url, key: svr.key, public_host: svr.public_host
                            });
                            
                            const covers = res.data.libraries || [];
                            if (covers.length > 0) {
                                distributeCovers(covers);
                                hasCovers.value = true;
                            }
                        }
                    } catch (e) { console.log("Bg load fail"); }
                };

                const distributeCovers = (covers) => {
                    const minItems = 12;
                    const rowCount = 5;
                    const rows = Array.from({ length: rowCount }, () => []);
                    covers.forEach((item, idx) => { rows[idx % rowCount].push(item); });
                    for (let i = 0; i < rowCount; i++) {
                        let current = [...rows[i]];
                        if (current.length === 0) current = [...covers];
                        if (current.length > 0) {
                            while (current.length < minItems) { current = [...current, ...current]; }
                            wallRows[i] = [...current, ...current];
                        }
                    }
                };

                // --- 3. 登录逻辑 ---
                const login = async () => {
                    if(!form.username || !form.password) {
                        errorMsg.value = '请输入用户名和密码'; triggerShake(); return;
                    }
                    loading.value = true; errorMsg.value = '';
                    try {
                        const res = await axios.post('/api/login', form);
                        if (res.data.status === 'ok') {
                            localStorage.setItem('isLoggedIn', 'true');
                            window.location.href = 'index.html';
                        }
                    } catch (e) {
                        errorMsg.value = '登录失败：账号或密码错误'; triggerShake();
                    } finally { loading.value = false; }
                };

                const triggerShake = () => { isError.value = true; setTimeout(() => isError.value = false, 400); };

                onMounted(() => {
                    // 确保先启动 Canvas 动画
                    startParticles();
                    // 再加载海报
                    initBackground();
                });

                return { form, login, errorMsg, loading, isError, wallRows, hasCovers };
            }
        }).mount('#login-app');
    </script>
</body>
</html>
